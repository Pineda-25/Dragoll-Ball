<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Explorador Dragon Ball</h1>
    <div id="buscar">
      <select>
        <option value="">Seleccionar una raza</option>
        <option value="HU">Humano</option>
        <option value="SA">Saiyan</option>
        <option value="NA">Namekiano</option>
        <option value="MA">Majin</option>
        <option value="FRI">Freezer</option>
        <option value="AN">Androide</option>
      </select>
      <button id="btnMostrar">Mostrar</button>
    </div>
    <div id="bloqueTabla">
      <table border="1">
        <thead>
          <tr>
            <th>#</th>
            <th>Nombre</th>
            <th>Ki</th>
            <th>Genero</th>
            <th>Imagen</th>
            <th>Detalle</th>
          </tr>
        </thead>
        <tbody id="cuerpoTabla"></tbody>
      </table>
    </div>
    <div id="bloqueDetalle">
        <div id="transformacion"></div>
        <h3>Transformaciones</h3>
        <select  id="trans">
        </select>
        <button id="btnVerTrasformacion">Ver Transformaciones </button>
    </div>
    <div id="info">
        <img id="imgPersonaje" src="" alt="Imagen del Personaje" width="200">
        <ul>
            <li><strong>Nombre:</strong> <span id="txtNombre"></span></li>
            <li><strong>Ki:</strong> <span id="txtKi"></span></li>
            <li><strong>Género:</strong> <span id="txtGenero"></span></li>
            <li><strong>Descripcion:</strong> <span id="txtDescripcion"></span></li>
        </ul>
    </div>
  </body>
</html>
